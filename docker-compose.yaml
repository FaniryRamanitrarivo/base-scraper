version: "3.9"

services:

  api:
    build: .
    container_name: scraper_api
    ports:
      - "8000:8000"
    depends_on:
      selenium-chrome:
        condition: service_healthy
      selenium-firefox:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped


  selenium-chrome:
    image: selenium/standalone-chrome
    container_name: selenium_chrome
    shm_size: 2gb
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped


  selenium-firefox:
    image: selenium/standalone-firefox
    container_name: selenium_firefox
    shm_size: 2gb
    ports:
      - "4445:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped


  test:
    build: .
    container_name: scraper_tests
    command: pytest -v
    volumes:
      - .:/app